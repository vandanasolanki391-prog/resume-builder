<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d');
            background-size: cover;
            background-position: center;
        }

        /* DARK OVERLAY */
        .overlay {
            background: rgba(0, 0, 0, 0.5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        /* GLASS CARD */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 16px;
            max-width: 750px;
            text-align: center;

            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }

        h1 {
            font-size: 42px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 14px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1a252f;
            transform: translateY(-2px);
        }

        .features {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .feature {
            background: #f4f6f8;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 13px;
            color: #333;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="card">

        <h1>Professional Resume Builder</h1>

        <p>
            Create a modern, clean and professional resume in minutes.
            Fill your details and generate a job-ready resume instantly.
        </p>

        <a class="btn" href="/create">Create Resume Now</a>

        <div class="features">
            <div class="feature">Easy to Use</div>
            <div class="feature">Premium Design</div>
            <div class="feature">Tables Layout</div>
            <div class="feature">Instant Preview</div>
        </div>

    </div>
</div>

</body>
</html>
