<!DOCTYPE html>
<html>
<head>
    <title>Create Resume</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            margin: 0;
            padding: 30px;
        }

        .form-container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section h2 {
            font-size: 18px;
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 8px;
            margin-bottom: 18px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        textarea {
            resize: vertical;
        }

        .row {
            display: flex;
            gap: 18px;
        }

        .col {
            flex: 1;
        }

        button {
            width: 100%;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1a252f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        td input {
            margin-bottom: 0;
        }

        .add-btn {
            width: auto;
            padding: 10px 18px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h1>Create Your Resume</h1>
    <p class="subtitle">Fill your details and generate a professional resume preview</p>

    <form action="/preview" method="POST">

        <div class="section">
            <h2>Personal Details</h2>

            <label>Full Name</label>
            <input type="text" name="name" required>

            <div class="row">
                <div class="col">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="col">
                    <label>Phone</label>
                    <input type="text" name="phone" required>
                </div>
            </div>

            <label>Address</label>
            <input type="text" name="address">

            <label>LinkedIn</label>
            <input type="text" name="linkedin">
        </div>

        <div class="section">
            <h2>Career Objective</h2>
            <textarea name="objective" rows="4"></textarea>
        </div>

        <div class="section">
            <h2>Education</h2>

            <table id="eduTable">
                <tr>
                    <th>Degree</th>
                    <th>Institute</th>
                    <th>Year</th>
                    <th>Percentage</th>
                </tr>

                <tr>
                    <td><input type="text" name="degree" placeholder="B.Com"></td>
                    <td><input type="text" name="institute" placeholder="MKBU"></td>
                    <td><input type="text" name="year" placeholder="2023"></td>
                    <td><input type="text" name="percentage" placeholder="70%"></td>
                </tr>
            </table>

            <button type="button" class="add-btn" onclick="addEducationRow()">+ Add Education Row</button>
        </div>

        <div class="section">
            <h2>Experience</h2>

            <table id="expTable">
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Duration</th>
                    <th>Description</th>
                </tr>

                <tr>
                    <td><input type="text" name="company" placeholder="Company Name"></td>
                    <td><input type="text" name="role" placeholder="Office Executive"></td>
                    <td><input type="text" name="duration" placeholder="1 Year"></td>
                    <td><input type="text" name="description" placeholder="Work description"></td>
                </tr>
            </table>

            <button type="button" class="add-btn" onclick="addExperienceRow()">+ Add Experience Row</button>
        </div>

        <div class="section">
            <h2>Skills</h2>
            <textarea name="skills" rows="3" placeholder="Python, Excel, Communication"></textarea>
        </div>

        <div class="section">
            <h2>Projects</h2>

            <label>Do you have any projects?</label>
            <select id="projectOption" onchange="toggleProjectBox()">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>

            <div id="projectBox" style="display:none;">
                <textarea name="projects" rows="4" placeholder="Write your projects here"></textarea>
            </div>
        </div>

        <div class="section">
            <h2>Certifications</h2>
            <textarea name="certifications" rows="4"></textarea>
        </div>

        <div class="row">
            <div class="col section">
                <h2>Languages</h2>
                <input type="text" name="languages" placeholder="Gujarati, Hindi, English">
            </div>

            <div class="col section">
                <h2>Hobbies</h2>
                <input type="text" name="hobbies" placeholder="Reading, Travelling">
            </div>
        </div>

        <button type="submit">Preview Resume</button>

    </form>
</div>

<script>
function addEducationRow() {
    var table = document.getElementById("eduTable");
    var row = table.insertRow(-1);

    row.innerHTML = `
        <td><input type="text" name="degree"></td>
        <td><input type="text" name="institute"></td>
        <td><input type="text" name="year"></td>
        <td><input type="text" name="percentage"></td>
    `;
}

function addExperienceRow() {
    var table = document.getElementById("expTable");
    var row = table.insertRow(-1);

    row.innerHTML = `
        <td><input type="text" name="company"></td>
        <td><input type="text" name="role"></td>
        <td><input type="text" name="duration"></td>
        <td><input type="text" name="description"></td>
    `;
}

function toggleProjectBox() {
    var option = document.getElementById("projectOption").value;
    var box = document.getElementById("projectBox");

    if(option === "yes") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}
</script>

</body>
</html>
